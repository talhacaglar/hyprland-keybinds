# Variables
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm-app -- xdg-terminal-exec
$browser = zen-browser

# --- Application Bindings ---
bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, B, Passwords, exec, uwsm-app -- bitwarden-desktop
bindd = SUPER SHIFT, L, Lock, exec, hyprlock

# --- Utility & Screenshots ---
bindd = SUPER, Z, Screenshot smart clipboard, exec, omarchy-cmd-screenshot smart clipboard
bindd = SUPER, ccedilla, Translate, exec, omarchy-launch-webapp "https://translate.google.com/?hl=tr&sl=auto&tl=tr&op=translate"

# --- AI Tools (Launch only) ---
bindd = SUPER, N, Notebook LM, exec, omarchy-launch-webapp "https://notebooklm.google.com/"
bindd = SUPER SHIFT, G, Gemini, exec, omarchy-launch-webapp "https://gemini.google.com"
bindd = SUPER, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com/"
bindd = SUPER SHIFT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, D, DeepSeek, exec, omarchy-launch-webapp "https://chat.deepseek.com/"

# --- Web Apps (Focus or Launch) ---
# Bu komutlar pencere zaten açıksa ona odaklanır, değilse açar.
bindd = SUPER, C, Calendar, exec, omarchy-launch-or-focus-webapp "Google Calendar" "https://calendar.google.com/calendar"
bindd = SUPER, E, Email, exec, omarchy-launch-or-focus-webapp "Gmail" "https://mail.google.com/"
bindd = SUPER SHIFT, W, WhatsApp, exec, omarchy-launch-or-focus-webapp "WhatsApp" "https://web.whatsapp.com"
bindd = SUPER ALT, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER ALT, T, Google Tasks, exec, omarchy-launch-or-focus-webapp "Google Tasks" "https://tasks.google.com"
bindd = SUPER SHIFT, K, Kairu, exec, omarchy-launch-or-focus-webapp "Kairu" "https://kairu.app/focus"
bindd = SUPER, Y, YouTube, exec, omarchy-launch-or-focus-webapp "YouTube" "https://youtube.com"

# --- Menu ---
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Passthrough Submap: VM kullanırken Hyprland kısayollarını yoksay
bind = SUPER, P, submap, passthru
submap = passthru

# Bu durumdan çıkmak için sadece SUPER + Escape tuşunu dinle
bind = SUPER, Escape, submap, reset
submap = reset

# Mouse tekerleği ile pencereler arası geçiş (Super + Tekerlek)
bind = SUPER, mouse_down, cyclenext
bind = SUPER, mouse_up, cyclenext, prev
